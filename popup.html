<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Screenshot to Mockup</title>
	<style>
		:root {
			color-scheme: light;
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			--bg: #f4f6fb;
			--panel: rgba(255, 255, 255, 0.92);
			--text: #162033;
			--muted: #61708a;
			--accent: #2563eb;
			--accent-strong: #1d4ed8;
			--border: rgba(22, 32, 51, 0.12);
		}

		body {
			margin: 0;
			width: 320px;
			background: radial-gradient(circle at top, #ffffff 0, #edf2ff 52%, #dde7f8 100%);
			color: var(--text);
		}

		.popup {
			padding: 16px;
		}

		h1 {
			font-size: 16px;
			margin: 0 0 6px;
			letter-spacing: -0.02em;
		}

		p {
			margin: 0 0 14px;
			color: var(--muted);
			font-size: 13px;
			line-height: 1.45;
		}

		button {
			width: 100%;
			border: 0;
			border-radius: 12px;
			padding: 12px 14px;
			font-size: 14px;
			font-weight: 600;
			color: white;
			background: linear-gradient(135deg, var(--accent), var(--accent-strong));
			cursor: pointer;
			box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
			transition: transform 140ms ease, box-shadow 140ms ease;
		}

		button:hover {
			transform: translateY(-1px);
			box-shadow: 0 14px 30px rgba(37, 99, 235, 0.34);
		}

		button:disabled {
			cursor: wait;
			opacity: 0.7;
			transform: none;
			box-shadow: none;
		}

		.status {
			min-height: 18px;
			margin-top: 12px;
			font-size: 12px;
			color: var(--muted);
		}

		.status.error {
			color: #b42318;
		}

		.status.success {
			color: #166534;
		}
	</style>
</head>
<body>
	<div class="popup">
		<h1>Screenshot to Mockup</h1>
		<p>Erfasst den sichtbaren Bereich des aktuellen Tabs und öffnet ihn direkt im Editor.</p>
		<button id="capture-btn" type="button">Screenshot erfassen</button>
		<div id="status" class="status">Bereit.</div>
	</div>
	<script src="popup.js"></script>
</body>
</html>

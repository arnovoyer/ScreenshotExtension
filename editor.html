<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Editor</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #eef2f8;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-solid: #ffffff;
      --text: #152033;
      --muted: #64748b;
      --border: rgba(21, 32, 51, 0.12);
      --shadow: 0 22px 60px rgba(15, 23, 42, 0.14);
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 40%),
        radial-gradient(circle at top right, rgba(209, 224, 255, 0.8), transparent 34%),
        linear-gradient(180deg, #eef3fb 0%, #e5ebf7 100%);
    }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 24px;
      min-height: 100vh;
      padding: 24px;
    }

    .panel {
      align-self: start;
      position: sticky;
      top: 24px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .panel p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label,
    .field legend {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    select,
    input[type="range"],
    input[type="color"] {
      width: 100%;
    }

    select,
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-solid);
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
      outline: none;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .range-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text);
    }

    .range-meta span:last-child {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .color-box {
      display: grid;
      gap: 6px;
    }

    .color-box span {
      font-size: 12px;
      color: var(--muted);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .button.primary {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.24);
    }

    .button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button:disabled {
      cursor: wait;
      opacity: 0.65;
      transform: none;
    }

    .status {
      min-height: 20px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: #b42318;
    }

    .status.success {
      color: #166534;
    }

    .preview {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8px;
      min-width: 0;
    }

    .canvas-shell {
      width: min(100%, 1320px);
      padding: 24px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.44);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 40%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(241, 245, 249, 0.72));
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .checkerboard {
      display: inline-block;
      background-image:
        linear-gradient(45deg, rgba(148, 163, 184, 0.3) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(148, 163, 184, 0.3) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(148, 163, 184, 0.3) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(148, 163, 184, 0.3) 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0;
      padding: 18px;
      border-radius: 22px;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 18px;
    }

    .empty-state {
      padding: 40px;
      border: 1px dashed rgba(100, 116, 139, 0.35);
      border-radius: 24px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.7);
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>Mockup Editor</h1>
      <p>Gestalte einen Screenshot mit Browser-Frame, Hintergrund und Schatten und exportiere ihn direkt als PNG.</p>

      <div class="field">
        <label for="frameStyle">Browser-Frame</label>
        <select id="frameStyle">
          <option value="none">Kein Frame</option>
          <option value="safari">Safari-Style</option>
          <option value="chrome">Chrome-Style</option>
        </select>
      </div>

      <div class="field">
        <label for="backgroundMode">Hintergrund</label>
        <select id="backgroundMode">
          <option value="transparent">Transparent</option>
          <option value="solid">Solide Farbe</option>
          <option value="gradient">Farbverlauf</option>
        </select>
      </div>

      <div class="field" id="solidColorGroup">
        <div class="color-box">
          <span>Solid Color</span>
          <input id="solidColor" type="color" value="#f4f7fb">
        </div>
      </div>

      <div class="field" id="gradientGroup">
        <div class="swatches">
          <div class="color-box">
            <span>Gradient Start</span>
            <input id="gradientStart" type="color" value="#edf2ff">
          </div>
          <div class="color-box">
            <span>Gradient End</span>
            <input id="gradientEnd" type="color" value="#dbeafe">
          </div>
        </div>
      </div>

      <div class="field">
        <div class="range-meta"><span>Padding</span><span id="paddingValue">56 px</span></div>
        <input id="padding" type="range" min="0" max="180" step="1" value="56">
      </div>

      <div class="field">
        <div class="range-meta"><span>Schlagschatten</span><span id="shadowValue">0.22</span></div>
        <input id="shadowOpacity" type="range" min="0" max="0.45" step="0.01" value="0.22">
      </div>

      <div class="field">
        <div class="range-meta"><span>Shadow Blur</span><span id="blurValue">42 px</span></div>
        <input id="shadowBlur" type="range" min="0" max="96" step="1" value="42">
      </div>

      <div class="actions">
        <button id="exportButton" class="button primary" type="button">PNG herunterladen</button>
        <button id="resetButton" class="button secondary" type="button">Auf Standard zurücksetzen</button>
      </div>

      <div id="status" class="status">Lade Screenshot ...</div>
    </aside>

    <main class="preview">
      <div class="canvas-shell">
        <div id="canvasWrap" class="checkerboard">
          <div id="emptyState" class="empty-state">Kein Screenshot geladen.</div>
          <canvas id="mockupCanvas" hidden></canvas>
        </div>
      </div>
    </main>
  </div>
  <script src="editor.js"></script>
</body>
</html>
